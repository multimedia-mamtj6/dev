<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Masuk — Admin Kuliah MAMTJ6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/kuliah/admin/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <!-- Mosque logo — falls back gracefully if path not found -->
    <img src="/media/masjid-logo-black.svg" class="login-logo" alt=""
         onerror="this.style.display='none'">

    <h1 class="login-title">Sistem Admin Kuliah</h1>
    <p class="login-subtitle">Masjid Al-Mukhlisin<br>Taman Jaya 6</p>

    <button class="btn-google" id="google-btn" onclick="signInWithGoogle()">
      <!-- Google logo SVG (inline, no external request) -->
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.254 17.64 11.947 17.64 9.2z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Log Masuk dengan Google
    </button>
  </div>
</div>

<script src="/kuliah/admin/app.js"></script>
<script>
(async () => {
    if (new URLSearchParams(location.search).get('denied')) {
        showToast('Akses ditolak. Akaun Google anda tidak dibenarkan.', 'error', 8000);
    }
    const { data: { session } } = await db.auth.getSession();
    if (session) {
        window.location.replace('/kuliah/admin/dashboard.html');
    }
})();
</script>
</body>
</html>
