<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Widget - Optimized</title>
  <style>
    /* BASE STYLES */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f0f0;
      /* Default background for standalone view */
      overflow: hidden;
    }

    /* THE WIDGET CONTAINER */
    .widget {
      max-width: 480px;
      /* Standard width for desktop/standalone */
      transition: transform 0.1s ease-out;
    }

    /* 1. & 2. EMBED MODE & TRANSPARENCY (Section 2 of Guide) */
    body.embed-mode {
      background: transparent !important;
      /* Shows Google Sites background */
      display: block;
      justify-content: initial;
      align-items: initial;
      height: 100vh;
      /* Section 7: clipping trap fix */
      padding: 0;
    }

    /* 4. THE MAX-WIDTH TRAP (Section 4 of Guide) */
    body.embed-mode .widget {
      border-radius: 0;
      box-shadow: none;
      max-width: none !important;
      width: 100%;
      transform-origin: top left;
      /* Section 3 & 7 */
    }

    /* Handle Large Viewports (Section 7) */
    body.large-viewport:not(.embed-mode) .widget {
      max-width: none;
      transform-origin: center center;
    }
  </style>
</head>

<body>
  <!-- 
      The 'widget' class is added here so the JS can target it.
      id="ww_fb40b67449b72" is the unique ID required by the weather provider.
    -->
  <div id="ww_fb40b67449b72" class="widget" v="1.3" loc="id" a='{
        "t": "horizontal",
        "lang": "ms",
        "sl_lpl": 1,
        "ids": ["wl8179"],
        "font": "Arial",
        "sl_ics": "one_a",
        "sl_sot": "celsius",
        "cl_bkg": "image",
        "cl_font": "#FFFFFF",
        "cl_cloud": "#FFFFFF",
        "cl_persp": "#81D4FA",
        "cl_sun": "#FFC107",
        "cl_moon": "#FFC107",
        "cl_thund": "#FF5722"
      }'>
    Weather for Temerloh:
    <a href="https://2ua.org/de/mys/temerloh/karte/" target="_blank">Temerloh karte</a>
  </div>

  <!-- Weather Provider Script -->
  <script async src="https://app1.weatherwidget.org/js/?id=ww_fb40b67449b72"></script>

  <script>
    /**
     * 2. The ?embed=1 pattern (Section 2)
     */
    (function initEmbedMode() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('embed') === '1') {
        document.body.classList.add('embed-mode');
        document.documentElement.style.overflow = 'hidden';
        document.body.style.overflow = 'hidden';
      }

      // Large Viewport Detection (Section 7)
      const LARGE_VIEWPORT_MIN_W = 768;
      const LARGE_VIEWPORT_MIN_H = 480;
      function updateViewportMode() {
        const isLarge = window.innerWidth >= LARGE_VIEWPORT_MIN_W && window.innerHeight >= LARGE_VIEWPORT_MIN_H;
        document.body.classList.toggle('large-viewport', isLarge);
        scaleWidgetToFit();
      }

      window.addEventListener('resize', updateViewportMode);
      // Initial check
      window.addEventListener('load', updateViewportMode);
    })();

    /**
     * 3. Iterative Scale-to-fit algorithm (Section 3 & 7)
     */
    function scaleWidgetToFit() {
      const widget = document.querySelector('.widget');
      if (!widget) return;

      const isEmbed = document.body.classList.contains('embed-mode');
      const isLarge = document.body.classList.contains('large-viewport');

      const containerWidth = window.innerWidth;
      const containerHeight = window.innerHeight;
      const MAX_SCALE = 3;

      let scale = 1;
      // The iterative loop: re-calculates width to ensure it fills the frame
      for (let i = 0; i < 8; i++) {
        widget.style.transform = 'none';
        widget.style.width = (containerWidth / scale) + 'px';

        const naturalHeight = widget.offsetHeight;
        const upperBound = (isEmbed || isLarge) ? MAX_SCALE : 1;
        const next = Math.min(upperBound, containerHeight / naturalHeight);

        if (Math.abs(next - scale) < 0.005) {
          scale = next;
          break;
        }
        scale = next;
      }

      // Final application
      widget.style.width = (containerWidth / scale) + 'px';
      widget.style.transform = `scale(${scale})`;
    }

    // Periodically check if the third-party script has finished loading and resizing
    // since weather widgets often inject content after the initial page load.
    let checks = 0;
    const interval = setInterval(() => {
      scaleWidgetToFit();
      if (checks++ > 10) clearInterval(interval);
    }, 500);
  </script>
</body>

</html>
