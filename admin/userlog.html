<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Aktiviti — Admin MAMTJ6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<nav id="main-nav">
  <span class="brand">Admin Kuliah</span>
  <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">&#9776;</button>
  <div class="nav-links">
    <a href="/admin/kuliah/dashboard.html" data-module="kuliah">Jadual</a>
    <a href="/admin/kuliah/ustaz.html" data-module="kuliah">Penceramah</a>
    <a href="/admin/infaq/ringkasan.html" data-module="infaq">Infaq</a>
    <a href="users.html">Pengguna</a>
    <a href="userlog.html" class="active">Log Aktiviti</a>
    <span class="spacer"></span>
    <button class="logout-btn" onclick="signOut()">Log Keluar</button>
  </div>
</nav>

<div class="page">
  <div class="section-header">
    <h1 class="section-title">Log Aktiviti</h1>
  </div>

  <div class="filter-bar">
    <div class="form-group">
      <label for="filter-admin">Admin</label>
      <select id="filter-admin" onchange="applyFilters()">
        <option value="">Semua Admin</option>
      </select>
    </div>
    <div class="form-group">
      <label for="filter-action">Tindakan</label>
      <select id="filter-action" onchange="applyFilters()">
        <option value="">Semua Tindakan</option>
      </select>
    </div>
    <div class="form-group">
      <label for="filter-from">Dari</label>
      <input type="date" id="filter-from" onchange="applyFilters()">
    </div>
    <div class="form-group">
      <label for="filter-to">Hingga</label>
      <input type="date" id="filter-to" onchange="applyFilters()">
    </div>
    <div class="form-group filter-actions">
      <button class="btn btn-ghost btn-sm" onclick="resetFilters()">Reset</button>
    </div>
  </div>

  <div class="card">
    <table class="data-table">
      <thead>
        <tr>
          <th style="width:170px">Masa</th>
          <th>Admin</th>
          <th>Tindakan</th>
          <th>Sasaran</th>
          <th>Butiran</th>
        </tr>
      </thead>
      <tbody id="log-tbody">
        <tr><td colspan="5" class="state-cell">Memuatkan...</td></tr>
      </tbody>
    </table>
  </div>

  <div style="text-align:center;margin-top:1rem">
    <button class="btn btn-ghost" id="load-more-log-btn" onclick="loadMoreLog()" style="display:none">Tunjuk 50 log lagi</button>
  </div>
</div>

<script src="/admin/app.js"></script>
<script src="/admin/userlog.js"></script>
</body>
</html>
