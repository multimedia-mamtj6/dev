<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAMTJ6 Development Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .logo {
            max-width: 150px;
            height: auto;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 15px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 40px;
        }
        
        .links {
            display: grid;
            gap: 15px;
            margin-top: 30px;
        }
        
        .link-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            display: block;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-size: 1.1em;
            font-weight: 600;
        }
        
        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .subtitle {
                font-size: 1em;
            }
        }
    </style>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="container">
        <img src="https://dev.mamtj6.com/media/logo-mamtj6/SVG/mamtj6-black.svg" alt="Logo MAMTJ6" class="logo">
        
        <h1>MAMTJ6</h1>
        <p class="subtitle">Development Portal</p>
        <p style="color: #666; margin-bottom: 20px;">Selamat datang ke portal pembangunan Masjid Al-Mukhlisin Taman Jaya 6</p>
        
        <div class="links">
            <a href="/calendar/hijri/hari-ini/" class="link-card">📅 Tarikh Hijri Hari Ini</a>
            <a href="/calendar/hijri/tarikh-penting/" class="link-card">📆 Tarikh Penting Islam</a>
            <a href="/kuliah/jadual/" class="link-card">📚 Jadual Kuliah</a>
            <a href="/csr/calc/kalkulator-budi95.html" class="link-card">🧮 Kalkulator Budi95</a>
        </div>
        
        <div class="footer">
            <p>© 2025 MAMTJ6. Hak Cipta Terpelihara.</p>
            <p style="margin-top: 10px; font-size: 0.8em;">
                <strong>Domains:</strong><br>
                multimedia-mamtj6.github.io<br>
                dev.mamtj6.com
            </p>
        </div>
    </div>
</body>
</html>
