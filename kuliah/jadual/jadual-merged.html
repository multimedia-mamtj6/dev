/* =========================================================
   Masjid Al-Mukhlisin — Jadual Kuliah
   Design tokens
   ========================================================= */
:root {
    --week-bg: #EAF1DD;
    --week-col-bg: #D9EAD3;
    --border-color: #000;
    --empty-cell-bg: #F2F2F2;
    --subuh-color: #0070C0;
    --maghrib-color: #C0504D;
    --date-header-bg: #FFFACD;
    --date-number-color: #2E5A88;
    --holiday-label-bg: #2c3e50;
    --today-highlight-bg: #f1e42c;

    /* Refined internal borders (Visual Improvement 2) */
    --cell-border: #bcbcbc;
    --cell-border-inner: #cfcfcf;
    --table-border: #000;
}

/* =========================================================
   Base
   ========================================================= */
* {
    box-sizing: border-box;
}

html,
body {
    height: 100%;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Poppins', sans-serif;
    color: #1a1a1a;
    background-color: #ffffff;
    overflow: hidden;
}

/* =========================================================
   Page shell — fills exactly one screen, no scroll
   ========================================================= */
.page-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
    padding: 1.2vmin 2.08vmin;
}

/* =========================================================
   Header
   ========================================================= */
.page-header {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 1.6vmin;
    padding-top: 2.6vmin;
    padding-bottom: 1vmin;
    flex-shrink: 0;
}

.logo-container {
    display: flex;
    align-items: center;
    justify-content: center;
}

.logo-container img {
    height: 8vmin;
    width: auto;
    display: block;
}

.title-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
}

.title-main {
    margin: 0;
    font-size: 2vmin;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #2b2b2b;
    line-height: 1.1;
}

.title-month {
    margin: 0;
    font-size: 5vmin;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: #111;
    line-height: 1;
}

/* =========================================================
   Main / Table
   ========================================================= */
main {
    flex-grow: 1;
    min-height: 0;
    display: flex;
}

.schedule-table {
    width: 100%;
    height: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    border: 2px solid var(--table-border);
}

.schedule-table th,
.schedule-table td {
    border: 1px solid var(--cell-border);
    overflow: hidden;
}

/* Day-name header row */
.schedule-table thead th {
    background-color: var(--week-bg);
    font-size: 1.6vmin;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: #33421f;
    padding: 0.7vmin 0;
    text-align: center;
    height: 3.2vmin;
}

/* First header cell governs the week column width (table-layout: fixed) */
.schedule-table thead th:first-child {
    width: 2.4%;
}

/* Week-number column */
.week-number-cell {
    width: 2.4%;
    background-color: var(--week-col-bg);
    text-align: center;
    vertical-align: middle;
    color: #33421f;
}

.week-label {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1.4vmin;
    line-height: 1.1;
    letter-spacing: 0.02em;
}

/* =========================================================
   Day cells — 3-layer absolute stack
   ========================================================= */
.day-cell {
    position: relative;
    background-color: var(--date-header-bg);
    vertical-align: top;
    width: 13.94%;
}

.day-cell.empty-cell {
    background-color: var(--empty-cell-bg);
}

/* Layer 1 — date number */
.date-number {
    position: absolute;
    top: 0.2vmin;
    left: 0.5vmin;
    font-size: 2.375vmin;
    font-weight: 700;
    color: var(--date-number-color);
    z-index: 3;
    line-height: 1;
}

/* Layer 2 — holiday header (only when cuti_umum) */
.date-header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    z-index: 2;
    padding-top: 0.4vmin;
}

.holiday-label {
    background-color: var(--holiday-label-bg);
    color: #ffffff;
    font-size: 1.1vmin;
    font-weight: 500;
    border-radius: 4px;
    padding: 0.2vmin 0.8vmin;
    white-space: normal;
    word-break: break-word;
    text-align: center;
    line-height: 1.25;
    margin-right: 0.5vmin;
    max-width: 80%;
}

/* Layer 3 — lecture content */
.lecture-content {
    position: absolute;
    top: 2.5vmin;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background-color: #ffffff;
    font-size: 1.2vmin;
    text-align: center;
    z-index: 1;
    padding: 0.4vmin 0.6vmin;
}

.lecture-content.is-empty-slot {
    background-color: var(--empty-cell-bg);
}

/* Yasiin & Tahlil — green cell, white text */
.lecture-content:has(.yasin-block) {
    background-color: #c3ffc5;
}

/* Adjacent lecture blocks separated by a soft divider */
.lecture-block + .lecture-block {
    border-top: 1px solid var(--cell-border-inner);
    padding-top: 0.5vmin;
    margin-top: 0.5vmin;
}

/* Session label — compact badge (Visual Improvement 1) */
.lecture-time {
    font-size: 1.6vmin;
    font-weight: 700;
    letter-spacing: 0.03em;
    line-height: 1.1;
    margin-bottom: 0.15vmin;
}

.lecture-time.subuh {
    color: var(--subuh-color);
}

.lecture-time.maghrib {
    color: var(--maghrib-color);
}

/* Lecturer name — the primary read */
.ustaz-name {
    font-size: 1.3vmin;
    font-weight: 600;
    color: #1c1c1c;
    line-height: 1.15;
}

/* Lecture title — secondary, italic, lighter */
.lecture-title {
    font-size: 1.1vmin;
    font-style: italic;
    font-weight: 400;
    color: #5f5f5f;
    line-height: 1.2;
    margin-top: 0.15vmin;
}

/* Weekend empty placeholder */
.lecture-block.is-weekend-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: var(--empty-cell-bg);
    border-radius: 3px;
    min-height: 3.5vmin;
}

/* Full-day empty text */
.empty-slot-text {
    font-size: 1.6vmin;
    font-weight: 700;
    color: #8a8a8a;
    letter-spacing: 0.03em;
}

/* =========================================================
   Special — Bacaan Yasiin & Tahlil
   ========================================================= */
.yasin-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.4vmin;
    height: 100%;
}

.arabic-text {
    font-family: 'Scheherazade New', 'Times New Roman', serif;
    font-size: 2.36vmin;
    line-height: 1.15;
    color: #000000;
}

.yasin-title {
    font-weight: 700;
    font-size: 1.4vmin;
    letter-spacing: 0.04em;
    color: #000000;
}

/* =========================================================
   Today highlight
   ========================================================= */
/* --- DEFAULT (live) --- */
.day-cell.is-today {
    background-color: var(--today-highlight-bg);
}

/* Glow drawn as an overlay ABOVE the white lecture-content layer */
.day-cell.is-today::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    box-shadow: inset 0 0 0 0.3vmin var(--today-highlight-bg),
                inset 0 0 0.5vmin 0.08vmin rgba(241, 228, 44, 0.85);
}

/* --- OPTION A — soft amber, left accent bar ---
.day-cell.is-today {
    background-color: #fef9c3;
    border-left: 4px solid #eab308;
}
*/

/* --- OPTION B — soft emerald, left accent bar ---
.day-cell.is-today {
    background-color: #ecfdf5;
    border-left: 4px solid #10b981;
}
*/

/* =========================================================
   Footer
   ========================================================= */
.page-footer {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    gap: 1.6vmin;
    padding-top: 1vmin;
    flex-shrink: 0;
    font-size: 1.4vmin;
}

.update-info {
    margin: 0;
    color: #555;
    font-style: italic;
    font-size: 1.4vmin;
}

.legend {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 0.8vmin;
    font-size: 1.3vmin;
}

.legend > span {
    font-weight: 600;
    color: #333;
}

.legend-box {
    padding: 0.5vmin 1.2vmin;
    font-size: 1.2vmin;
    font-weight: 600;
    letter-spacing: 0.02em;
    border-radius: 3px;
    white-space: nowrap;
}

.empty-slot-legend {
    background-color: var(--empty-cell-bg);
    color: #555;
    border: 1px solid #d0d0d0;
}

.public-holiday-legend {
    background-color: var(--holiday-label-bg);
    color: #ffffff;
}

.today-legend {
    background-color: var(--today-highlight-bg);
    color: #333;
}

.footer-link {
    margin: 0;
    color: #555;
    font-size: 1.4vmin;
    text-align: right;
}

.footer-link a {
    color: var(--subuh-color);
    text-decoration: none;
    font-weight: 500;
}

.footer-link a:hover {
    text-decoration: underline;
}

/* =========================================================
   Mobile container (content out of scope)
   ========================================================= */
#mobile-view-container {
    display: none;
}

/* =========================================================
   Responsive breakpoint
   ========================================================= */
@media (max-width: 768px) {
    body {
        overflow: auto;
    }

    .schedule-table {
        display: none;
    }

    #mobile-view-container {
        display: block;
    }
}

/* =========================================================
   Print — A4 landscape
   ========================================================= */
@media print {
    @page {
        size: A4 landscape;
        margin: 0;
    }

    }

    body {
        overflow: visible !important;
        background-color: white;
    }

    #mobile-view-container {
        display: none !important;
    }

    .schedule-table {
        display: table !important;
    }

    .legend-box.today-legend {
        display: none !important;
    }

        max-width: none !important;
        padding: 1cm !important;

    }

    }

        border-collapse: separate;
        border-spacing: 0;
    }

    .schedule-table thead th {
        box-shadow: inset 0 0 0 1000px var(--week-bg);
    }

    .week-number-cell {
        box-shadow: inset 0 0 0 1000px var(--week-col-bg);
    }

    .day-cell {

    }

    .day-cell.empty-cell {
        box-shadow: inset 0 0 0 1000px var(--empty-cell-bg);
    }

    .lecture-content.is-empty-slot {
        background-color: var(--empty-cell-bg);
    }

    .holiday-label {
        background-color: var(--holiday-label-bg) !important;
        color: #ffffff !important;
    }

    .schedule-table th,
    .schedule-table td {
        border: 0.5pt solid #555;
        padding: 0 !important;
        position: relative;
    }

    .title-container .title-main {
        font-size: 14pt;

    .schedule-table thead th {

    }

    .week-label {
        font-size: 8pt;
    }

    .date-number {
        position: absolute;

        left: 4pt;

        z-index: 3;

    }

        font-size: 18pt;
    }

    .yasin-title {
        font-size: 8pt;
    }

    .page-footer {
        font-size: 7pt;
    }
}

/* ---------------------------------------------------------
   Helpers
   --------------------------------------------------------- */
function pad2(n) {
    return String(n).padStart(2, '0');
}

function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

/* ---------------------------------------------------------
   Data fetch
   --------------------------------------------------------- */
async function fetchScheduleData() {
    try {
        const response = await fetch(`/kuliah/data/jadual_lengkap.json?v=${new Date().getTime()}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return await response.json();
    } catch (err) {
        console.warn('Live JSON unavailable, using embedded data.', err);
        return EMBEDDED_DATA;
    }
}

/* ---------------------------------------------------------
   Lecture block builders (return HTML strings)
   --------------------------------------------------------- */
function createLectureBlock(type, sessionData) {
    // Special case — Bacaan Yasiin & Tahlil
    if (sessionData.nama_penceramah && sessionData.nama_penceramah.indexOf('Yasiin') !== -1) {
        return `<div class="lecture-block yasin-block">
                    <div class="arabic-text" lang="ar" dir="rtl">باچاءن يسٓ دان تهليل</div>
                    <div class="yasin-title">BACAAN YASIIN &amp; TAHLIL</div>
                </div>`;
    }

    const label = type === 'subuh' ? 'Subuh' : 'Maghrib';
    return `<div class="lecture-block">
                <div class="lecture-time ${type}">${label}</div>
                <div class="ustaz-name">${escapeHtml(sessionData.nama_penceramah)}</div>
                <div class="lecture-title">${escapeHtml(sessionData.tajuk_kuliah)}</div>
            </div>`;
}

function createEmptyLectureBlock() {
    return `<div class="lecture-block is-weekend-empty">
                <div class="empty-slot-text">Slot Kosong</div>
            </div>`;
}

/* ---------------------------------------------------------
   Single day cell builder (returns HTML string)
   --------------------------------------------------------- */
function buildDayCell(dayNumber, year, month, dataByDate, todayString) {
    // No day → padding cell
    if (!dayNumber) {
        return '<td class="day-cell empty-cell"></td>';
    }

    const dateObj = new Date(year, month, dayNumber);   // day-of-week detection
    const dayOfWeek = dateObj.getDay();                 // 0 = Sun, 6 = Sat
    const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
    const dateString = `${year}-${pad2(month + 1)}-${pad2(dayNumber)}`;
    const entry = dataByDate[dateString];

    let cellClass = 'day-cell';
    if (dateString === todayString) {
        cellClass += ' is-today';
    }

    // STATE 5 — no JSON entry for this date
    if (!entry) {
        return `<td class="${cellClass}">
                    <div class="date-number">${dayNumber}</div>
                    <div class="lecture-content"></div>
                </td>`;
    }

    // Layer 1 — date number
    let inner = `<div class="date-number">${dayNumber}</div>`;

    // Layer 2 — holiday header (STATE 3)
    if (entry.cuti_umum) {
        inner += `<div class="date-header">
                      <span class="holiday-label">🌙 ${escapeHtml(entry.cuti_umum)}</span>
                  </div>`;
    }

    // Layer 3 — lecture content
    const subuh = entry.subuh;
    const maghrib = entry.maghrib;

    // STATE 4 — full-day empty
    if (!subuh && !maghrib) {
        return `<td class="${cellClass}">
                    ${inner}
                    <div class="lecture-content is-empty-slot">
                        <div class="empty-slot-text">Slot Kosong</div>
                    </div>
                </td>`;
    }

    // STATE 1 — normal day (one or both sessions)
    let blocks = '';

    // Subuh
    if (subuh) {
        blocks += createLectureBlock('subuh', subuh);
    } else if (isWeekend) {
        blocks += createEmptyLectureBlock();
    }

    // Maghrib
    if (maghrib) {
        blocks += createLectureBlock('maghrib', maghrib);
    } else if (isWeekend) {
        blocks += createEmptyLectureBlock();
    }

    inner += `<div class="lecture-content">${blocks}</div>`;

    return `<td class="${cellClass}">${inner}</td>`;
}

/* ---------------------------------------------------------
   Week label cell (stacked characters — Xibo-safe, no rotation)
   --------------------------------------------------------- */
function buildWeekLabelCell(weekNumber) {
    const chars = ['M', 'I', 'N', 'G', 'G', 'U'];
    let spans = chars.map(c => `<span>${c}</span>`).join('');
    spans += '<span>&nbsp;</span>';
    spans += `<span>${weekNumber}</span>`;
    return `<td class="week-number-cell"><div class="week-label">${spans}</div></td>`;
}

/* ---------------------------------------------------------
   Desktop calendar renderer
   --------------------------------------------------------- */
function renderCalendarDesktop(senaraiHari, targetDate) {
    const tbody = document.getElementById('calendar-body');
    if (!tbody) return;

    const year = targetDate.getFullYear();
    const month = targetDate.getMonth();

    const firstDayOfMonth = new Date(year, month, 1).getDay(); // 0=Sun … 6=Sat
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    // Index data by ISO date string
    const dataByDate = {};
    senaraiHari.forEach(d => { dataByDate[d.date] = d; });

    // Today string (for highlight)
    const today = new Date();
    const todayString = `${today.getFullYear()}-${pad2(today.getMonth() + 1)}-${pad2(today.getDate())}`;

    // Build a 35-slot grid; place day 1 at firstDayOfMonth.
    // Overflow beyond 35 wraps back into empty slots of the grid.
    const slots = new Array(35).fill(null);
    for (let day = 1; day <= daysInMonth; day++) {
        const idx = (firstDayOfMonth + day - 1) % 35;
        slots[idx] = day;
    }

    let html = '';
    for (let row = 0; row < 5; row++) {
        html += '<tr>';
        html += buildWeekLabelCell(row + 1);
        for (let col = 0; col < 7; col++) {
            const idx = row * 7 + col;
            html += buildDayCell(slots[idx], year, month, dataByDate, todayString);
        }
        html += '</tr>';
    }

    tbody.innerHTML = html;
}

/* ---------------------------------------------------------
   Boot
   --------------------------------------------------------- */
document.addEventListener('DOMContentLoaded', async () => {
    // 1. URL params
    const urlParams = new URLSearchParams(window.location.search);

    const baseDate = new Date();
    if (urlParams.get('bulan') === 'depan') {
        baseDate.setMonth(baseDate.getMonth() + 1);
    }

    // 2. Fetch JSON (cache-busted, with embedded fallback)
    const jsonData = await fetchScheduleData();

    // 3. Footer update info
    const updateInfoEl = document.getElementById('update-info');
    if (updateInfoEl && jsonData.infoJadual) {
        updateInfoEl.textContent = jsonData.infoJadual.tarikhKemasKini || '';
    }

    // 4. Schedule title
    const titleEl = document.getElementById('schedule-title');
    if (titleEl && jsonData.infoJadual) {
        titleEl.textContent = jsonData.infoJadual.tajukBulan || '';
    }

    // 5. Render desktop calendar
    renderCalendarDesktop(jsonData.senaraiHari, baseDate);

    // 6. Auto-print for PDF context
    if (urlParams.get('file') === 'pdf') {
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                setTimeout(() => { window.print(); }, 250);
            });
        });
    }
});
