<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadual Kuliah Maghrib &amp; Subuh — Masjid Al-Mukhlisin</title>
    <link rel="stylesheet" href="/kuliah2/jadual/style.css">
</head>
<body>
    <div class="page-container">

        <header class="page-header">
            <div class="logo-container">
                <img src="https://multimedia.mamtj6.com/media/logo/mamtj6-black.webp" alt="Logo Masjid Al-Mukhlisin">
            </div>
            <div class="title-container">
                <p class="title-main">JADUAL PENYAMPAI KULIAH MAGHRIB DAN SUBUH</p>
                <h1 class="title-month" id="schedule-title"></h1>
            </div>
        </header>

        <main>
            <div id="mobile-view-container">
                <div id="today-kuliah-card"></div>
                <div id="mobile-card-list"></div>
            </div>

            <table class="schedule-table">
                <thead>
                    <tr>
                        <th></th>
                        <th>AHAD</th>
                        <th>ISNIN</th>
                        <th>SELASA</th>
                        <th>RABU</th>
                        <th>KHAMIS</th>
                        <th>JUMAAT</th>
                        <th>SABTU</th>
                    </tr>
                </thead>
                <tbody id="calendar-body"></tbody>
            </table>
        </main>

        <footer class="page-footer">
            <p class="update-info" id="update-info"></p>
            <div class="legend">
                <span>Petunjuk:</span>
                <div class="legend-box empty-slot-legend">SLOT KOSONG/ TERBUKA</div>
                <div class="legend-box public-holiday-legend">CUTI UMUM</div>
                <div class="legend-box today-legend">KULIAH HARI INI</div>
            </div>
            <p class="footer-link">
                Jadual ini juga boleh diakses melalui pautan:
                <a href="https://www.mamtj6.com/kuliah/info">https://www.mamtj6.com/kuliah/info</a>
            </p>
        </footer>

    </div>

    <script src="/kuliah2/jadual/script.js"></script>
</body>
</html>
