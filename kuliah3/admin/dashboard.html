<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadual Kuliah — Admin MAMTJ6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<nav>
  <span class="brand">Admin Kuliah</span>
  <a href="dashboard.html" class="active">Jadual</a>
  <a href="ustaz.html">Penceramah</a>
  <span class="spacer"></span>
  <button class="logout-btn" onclick="signOut()">Log Keluar</button>
</nav>

<div class="page">

  <!-- Toolbar: month nav + publish button -->
  <div class="toolbar">
    <div class="month-nav">
      <button class="nav-btn" onclick="prevMonth()" title="Bulan sebelum">&#8249;</button>
      <span class="month-label" id="month-label">—</span>
      <button class="nav-btn" onclick="nextMonth()" title="Bulan depan">&#8250;</button>
    </div>
    <div class="spacer" style="flex:1"></div>
    <button class="btn btn-primary" id="publish-btn" onclick="publishMonth()">
      Terbitkan
    </button>
  </div>

  <!-- Calendar -->
  <div class="card" style="overflow-x:auto">
    <table class="calendar" id="calendar-table">
      <thead>
        <tr>
          <th>Ahad</th>
          <th>Isnin</th>
          <th>Selasa</th>
          <th>Rabu</th>
          <th>Khamis</th>
          <th>Jumaat</th>
          <th>Sabtu</th>
        </tr>
      </thead>
      <tbody id="calendar-body">
        <tr><td colspan="7" class="state-cell">Memuatkan jadual...</td></tr>
      </tbody>
    </table>
  </div>

  <p style="margin-top:0.75rem;font-size:0.75rem;color:var(--text-muted)">
    Klik mana-mana tarikh untuk mengedit kuliah atau menandakan cuti umum.
    Tekan <strong>Terbitkan</strong> untuk menghantar jadual ke laman web.
  </p>
</div>

<!-- ── Day editor modal ── -->
<div class="modal-overlay" id="day-modal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-date-label">—</span>
      <button class="modal-close" onclick="closeModal()" title="Tutup">&times;</button>
    </div>

    <!-- Cuti umum -->
    <div class="form-group">
      <div class="toggle-row" style="margin-bottom:0.5rem">
        <input type="checkbox" id="cuti-check" onchange="toggleCutiField()">
        <label for="cuti-check">Hari Cuti Umum</label>
      </div>
      <input type="text" id="cuti-text" placeholder="Nama cuti (cth: Hari Raya Aidilfitri)"
             style="display:none; margin-top:0.375rem">
    </div>

    <!-- Subuh ustaz -->
    <div class="form-group">
      <label for="subuh-select">Kuliah Subuh</label>
      <select id="subuh-select">
        <option value="">— Tiada Kuliah —</option>
      </select>
    </div>

    <!-- Maghrib ustaz -->
    <div class="form-group">
      <label for="maghrib-select">Kuliah Maghrib</label>
      <select id="maghrib-select">
        <option value="">— Tiada Kuliah —</option>
      </select>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveDay()">Simpan</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
