<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harga Minyak Malaysia — MAMTJ6</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2563eb;
      --primary-light: #eff6ff;
      --border: #e5e7eb;
      --bg: #f9fafb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --up: #dc2626;
      --down: #16a34a;
      --neutral: #9ca3af;
      --budi-badge: #2563eb;
      --pam-badge: #94a3b8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    /* ── Header ── */
    .page-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .page-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }
    .page-header p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Card wrapper ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 900px;
      margin: 0 auto;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    /* ── Week navigation ── */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .week-nav button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .week-nav button:hover:not(:disabled) {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }
    .week-nav button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .week-label {
      text-align: center;
      flex: 1;
    }
    .week-label .label-tag {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .week-label .date-range {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Loading / error ── */
    .empty-state {
      text-align: center;
      padding: 48px 24px 56px;
      color: var(--muted);
    }
    .empty-state svg {
      width: 72px;
      height: 72px;
      margin-bottom: 16px;
      opacity: 0.55;
    }
    .empty-state p {
      font-size: 0.88rem;
      max-width: 300px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .status-msg {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .status-msg.error { color: var(--up); }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
    }

    /* Region header row */
    .th-region {
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
    }
    .th-region th {
      padding: 12px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
    }
    .th-region th:first-child { text-align: left; }
    .th-region th.region-header {
      border-left: 1px solid var(--border);
      font-weight: 700;
      color: var(--text);
      font-size: 0.82rem;
    }

    /* Sub-column header row */
    .th-sub {
      background: #f8fafc;
      border-bottom: 2px solid var(--border);
    }
    .th-sub th {
      padding: 8px 14px 10px;
      font-size: 0.72rem;
      font-weight: 500;
      text-align: center;
      white-space: nowrap;
    }

    /* Badge pills */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-pam  { background: #e2e8f0; color: #475569; }
    .badge-budi { background: var(--budi-badge); color: #fff; }

    /* Data rows */
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }

    td {
      padding: 16px 14px;
      vertical-align: middle;
      text-align: center;
      font-size: 0.9rem;
    }
    td:first-child { text-align: left; }
    td.sep { border-left: 1px solid var(--border); }

    /* Fuel name cell */
    .fuel-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.45);
    }
    .fuel-sub {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 3px rgba(0,0,0,0.35);
      margin-top: 2px;
    }

    /* Fuel gradient backgrounds */
    /* Desktop td: fade to white */
    td.fuel-ron95  { background: linear-gradient(to right, #d4a800 0%, #e8b800 40%, rgba(255,255,255,0) 100%), #ffffff; }
    td.fuel-ron97  { background: linear-gradient(to right, #15803d 0%, #1a9e4e 40%, rgba(255,255,255,0) 100%), #ffffff; }
    td.fuel-diesel { background: linear-gradient(to right, #111827 0%, #374151 45%, rgba(255,255,255,0) 100%), #ffffff; }


    /* Price cell */
    .price-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .price-val {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
    }
    .price-delta {
      font-size: 0.72rem;
      font-weight: 600;
      margin-top: 2px;
    }
    .delta-up   { color: var(--up); }
    .delta-down { color: var(--down); }
    .delta-flat { color: var(--neutral); }

    .no-data {
      color: var(--neutral);
      font-size: 1rem;
    }

    /* ── Footer ── */
    .page-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.76rem;
      color: var(--muted);
    }
    .page-footer a {
      color: var(--primary);
      text-decoration: none;
    }
    .page-footer a:hover { text-decoration: underline; }

    /* ── Mobile cards ── */
    .mobile-cards { display: none; padding: 12px; }

    .fuel-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .fuel-card-header {
      padding: 12px 16px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .fuel-card-header .fuel-name {
      font-size: 1rem;
    }
    .fuel-card-header .fuel-sub {
      font-size: 0.75rem;
    }
    .fuel-card-body {
      display: flex;
    }
    .region-col {
      flex: 1;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
    }
    .region-col + .region-col {
      border-left: 1px solid var(--border);
    }
    .region-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }
    .price-group {
      margin-bottom: 10px;
    }
    .price-group:last-child { margin-bottom: 0; }
    .pg-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .pg-label.budi { color: var(--primary); }
    .pg-val {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      body { padding: 16px 8px 40px; }
      .page-header h1 { font-size: 1.2rem; }
      .week-nav { padding: 14px 12px; gap: 8px; }
      .week-label .date-range { font-size: 0.8rem; }
      .desktop-table { display: none; }
      .mobile-cards  { display: block; }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <h1>Harga Minyak Terkini</h1>
    <p>Harga petrol &amp; diesel mingguan (Semenanjung Malaysia &amp; Sabah/Sarawak)</p>
  </header>

  <div class="card">
    <!-- Week navigation -->
    <div class="week-nav">
      <button id="btn-prev" title="Minggu lepas" aria-label="Minggu lepas">&#8249;</button>
      <div class="week-label">
        <div class="label-tag" id="week-tag">Memuatkan…</div>
        <div class="date-range" id="week-dates"></div>
      </div>
      <button id="btn-next" title="Minggu depan" aria-label="Minggu depan">&#8250;</button>
    </div>

    <!-- Price table (replaced by status msg while loading) -->
    <div id="table-container">
      <div class="status-msg" id="status-msg">Memuatkan data harga minyak…</div>
    </div>
  </div>

  <footer class="page-footer">
    Sumber data: <a href="https://data.gov.my/data-catalogue/fuelprice" target="_blank" rel="noopener">data.gov.my</a> (Kementerian Kewangan Malaysia) &nbsp;·&nbsp;
    <a href="kalkulator-budi95.html">Kalkulator Petrol Budi95</a>
  </footer>

  <script>
    const API_URL = 'https://api.data.gov.my/data-catalogue?id=fuelprice&limit=40&sort=-date';

    const FUEL_ROWS = [
      {
        name: 'RON95',
        sub: 'Petrol',
        tdClass: 'fuel-ron95',
        cardBg: 'linear-gradient(to right, #d4a800, #e8b800, #fef3c7)',
        semPam:   d => d.ron95,
        semBudi:  d => d.ron95_budi95,
        eMyPam:   d => d.ron95,
        eMyBudi:  d => d.ron95_budi95,
        changeSemPam:  c => c.ron95,
        changeSemBudi: c => c.ron95_budi95,
        changeEMyPam:  c => c.ron95,
        changeEMyBudi: c => c.ron95_budi95,
      },
      {
        name: 'RON97',
        sub: 'Petrol',
        tdClass: 'fuel-ron97',
        cardBg: 'linear-gradient(to right, #15803d, #1a9e4e, #dcfce7)',
        semPam:   d => d.ron97,
        semBudi:  null,
        eMyPam:   d => d.ron97,
        eMyBudi:  null,
        changeSemPam:  c => c.ron97,
        changeSemBudi: null,
        changeEMyPam:  c => c.ron97,
        changeEMyBudi: null,
      },
      {
        name: 'Diesel',
        sub: 'B10/B20',
        tdClass: 'fuel-diesel',
        cardBg: 'linear-gradient(to right, #111827, #374151, #9ca3af)',
        semPam:   d => d.diesel,
        semBudi:  null,
        eMyPam:   d => d.diesel_eastmsia,
        eMyBudi:  null,
        changeSemPam:  c => c.diesel,
        changeSemBudi: null,
        changeEMyPam:  c => c.diesel_eastmsia,
        changeEMyBudi: null,
      },
    ];

    let allWeeks = [];   // sorted descending (newest first)
    let changes  = {};   // keyed by date → change_weekly record
    let activeIdx = 0;   // index into allWeeks (0 = current week)

    // ── Helpers ─────────────────────────────────────────────

    function parseLocalDate(str) {
      // YYYY-MM-DD → local midnight (avoid UTC shift)
      return new Date(str + 'T00:00:00');
    }

    function fmtDate(str) {
      return parseLocalDate(str).toLocaleDateString('ms-MY', {
        day: 'numeric', month: 'short', year: 'numeric'
      });
    }

    // Malaysian fuel prices effective Thu–Wed; find the Thursday of the API date's week
    function weekRange(dateStr) {
      const d = parseLocalDate(dateStr);
      // Shift to Thursday (getDay: 0=Sun,1=Mon,...,4=Thu)
      const daysToThu = (4 - d.getDay() + 7) % 7;
      const thu = new Date(d);
      thu.setDate(d.getDate() + daysToThu);
      const wed = new Date(thu);
      wed.setDate(thu.getDate() + 6);
      const fmt = dt => dt.toLocaleDateString('ms-MY', { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' });
      return `${fmt(thu)} – ${fmt(wed)}`;
    }

    function weekTag(idx) {
      if (idx === 0) return 'Minggu ini';
      if (idx === -1) return 'Minggu depan';
      if (idx === 1) return 'Minggu lepas';
      if (idx > 1)   return `${idx} minggu lepas`;
      return 'Minggu depan';
    }

    function deltaHtml(val) {
      if (val == null || val === undefined) return '';
      const n = parseFloat(val);
      if (isNaN(n) || n === 0) return '<div class="price-delta delta-flat">→ Tiada perubahan</div>';
      const sign = n > 0 ? '+' : '';
      const cls  = n > 0 ? 'delta-up' : 'delta-down';
      const arrow = n > 0 ? '↑' : '↓';
      return `<div class="price-delta ${cls}">${arrow} ${sign}RM ${Math.abs(n).toFixed(2)}</div>`;
    }

    function priceCell(priceVal, changeVal) {
      if (priceVal == null || priceVal === undefined || priceVal === '') {
        return '<span class="no-data">–</span>';
      }
      const n = parseFloat(priceVal);
      if (isNaN(n)) return '<span class="no-data">–</span>';
      return `<div class="price-cell"><div class="price-val">RM ${n.toFixed(2)}</div>${deltaHtml(changeVal)}</div>`;
    }

    // ── Render ───────────────────────────────────────────────

    function render() {
      const relIdx = activeIdx - currentWeekIdx; // negative = future, 0 = current, positive = past
      const isNextWeek = relIdx < 0;

      // Update navigation header
      document.getElementById('week-tag').textContent   = weekTag(relIdx);
      document.getElementById('btn-prev').disabled = activeIdx >= allWeeks.length - 1;
      document.getElementById('btn-next').disabled = activeIdx <= currentWeekIdx - 1;

      // Next week with no data yet → empty state
      if (isNextWeek) {
        // Compute the upcoming Thursday date for display
        const lastWeek = allWeeks[currentWeekIdx];
        const lastDate = parseLocalDate(lastWeek.date);
        const daysToNextThu = (4 - lastDate.getDay() + 7) % 7 || 7;
        const nextThu = new Date(lastDate);
        nextThu.setDate(lastDate.getDate() + daysToNextThu);
        const nextWed = new Date(nextThu);
        nextWed.setDate(nextThu.getDate() + 6);
        const fmt = dt => dt.toLocaleDateString('ms-MY', { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' });
        document.getElementById('week-dates').textContent = `${fmt(nextThu)} – ${fmt(nextWed)}`;

        document.getElementById('table-container').innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="8" y="20" width="48" height="36" rx="4" fill="#bfdbfe"/>
              <rect x="8" y="20" width="48" height="12" rx="4" fill="#93c5fd"/>
              <circle cx="44" cy="14" r="8" fill="#60a5fa"/>
              <path d="M41 14h6M44 11v6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
              <rect x="16" y="38" width="12" height="2" rx="1" fill="#93c5fd"/>
              <rect x="16" y="44" width="20" height="2" rx="1" fill="#93c5fd"/>
            </svg>
            <p>Nantikan kemas kini harga minyak pada hari Rabu setiap minggu.</p>
          </div>`;
        return;
      }

      const week   = allWeeks[activeIdx];
      const change = changes[week.date] || {};
      document.getElementById('week-dates').textContent = weekRange(week.date);

      // Build table rows
      const rows = FUEL_ROWS.map(f => {
        const semPam  = f.semPam  ? f.semPam(week)  : null;
        const semBudi = f.semBudi ? f.semBudi(week)  : null;
        const eMyPam  = f.eMyPam  ? f.eMyPam(week)  : null;
        const eMyBudi = f.eMyBudi ? f.eMyBudi(week)  : null;

        const cSemPam  = f.changeSemPam  ? f.changeSemPam(change)  : null;
        const cSemBudi = f.changeSemBudi ? f.changeSemBudi(change)  : null;
        const cEMyPam  = f.changeEMyPam  ? f.changeEMyPam(change)  : null;
        const cEMyBudi = f.changeEMyBudi ? f.changeEMyBudi(change)  : null;

        return `
          <tr>
            <td class="${f.tdClass}">
              <div class="fuel-name">${f.name}</div>
              <div class="fuel-sub">${f.sub}</div>
            </td>
            <td>${priceCell(semPam,  cSemPam)}</td>
            <td>${f.semBudi !== null ? priceCell(semBudi, cSemBudi) : '<span class="no-data">–</span>'}</td>
            <td class="sep">${priceCell(eMyPam,  cEMyPam)}</td>
            <td>${f.eMyBudi !== null ? priceCell(eMyBudi, cEMyBudi) : '<span class="no-data">–</span>'}</td>
          </tr>`;
      }).join('');

      // Build mobile cards
      const cards = FUEL_ROWS.map(f => {
        const semPam2  = f.semPam  ? f.semPam(week)  : null;
        const semBudi2 = f.semBudi ? f.semBudi(week)  : null;
        const eMyPam2  = f.eMyPam  ? f.eMyPam(week)  : null;
        const eMyBudi2 = f.eMyBudi ? f.eMyBudi(week)  : null;
        const cSemPam2  = f.changeSemPam  ? f.changeSemPam(change)  : null;
        const cSemBudi2 = f.changeSemBudi ? f.changeSemBudi(change)  : null;
        const cEMyPam2  = f.changeEMyPam  ? f.changeEMyPam(change)  : null;
        const cEMyBudi2 = f.changeEMyBudi ? f.changeEMyBudi(change)  : null;

        const priceGroup = (label, isBudi, priceVal, changeVal) => {
          const val = priceVal != null && !isNaN(parseFloat(priceVal))
            ? `<div class="pg-val">RM ${parseFloat(priceVal).toFixed(2)}</div>${deltaHtml(changeVal)}`
            : `<div class="pg-val no-data">–</div>`;
          return `<div class="price-group">
            <div class="pg-label${isBudi ? ' budi' : ''}">${label}</div>
            ${val}
          </div>`;
        };

        return `
          <div class="fuel-card">
            <div class="fuel-card-header" style="background:${f.cardBg}">
              <span class="fuel-name">${f.name}</span>
              <span class="fuel-sub">${f.sub}</span>
            </div>
            <div class="fuel-card-body">
              <div class="region-col">
                <div class="region-label">Semenanjung Malaysia</div>
                ${priceGroup('Harga Pam', false, semPam2, cSemPam2)}
                ${f.semBudi !== null ? priceGroup('Harga Budi95', true, semBudi2, cSemBudi2) : ''}
              </div>
              <div class="region-col">
                <div class="region-label">Sabah &amp; Sarawak</div>
                ${priceGroup('Harga Pam', false, eMyPam2, cEMyPam2)}
                ${f.eMyBudi !== null ? priceGroup('Harga Budi95', true, eMyBudi2, cEMyBudi2) : ''}
              </div>
            </div>
          </div>`;
      }).join('');

      document.getElementById('table-container').innerHTML = `
        <div class="desktop-table">
          <div class="table-wrap">
            <table>
              <thead>
                <tr class="th-region">
                  <th rowspan="2" style="width:160px"></th>
                  <th colspan="2" class="region-header">Semenanjung Malaysia</th>
                  <th colspan="2" class="region-header sep">Sabah &amp; Sarawak</th>
                </tr>
                <tr class="th-sub">
                  <th><span class="badge badge-pam">Harga Pam</span></th>
                  <th><span class="badge badge-budi">Harga Budi95</span></th>
                  <th><span class="badge badge-pam">Harga Pam</span></th>
                  <th><span class="badge badge-budi">Harga Budi95</span></th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
        <div class="mobile-cards">${cards}</div>`;
    }

    // ── Fetch & init ─────────────────────────────────────────

    let currentWeekIdx = 0;

    async function init() {
      try {
        const res = await fetch(API_URL + `&v=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        // Split into level prices and weekly changes
        const levels  = data.filter(d => d.series_type === 'level');
        const changeW = data.filter(d => d.series_type === 'change_weekly');

        if (!levels.length) throw new Error('Tiada data');

        // Map changes by date
        changeW.forEach(c => { changes[c.date] = c; });

        // Sort weeks descending (newest first)
        allWeeks = levels.sort((a, b) => b.date.localeCompare(a.date));

        // Find current week: latest date ≤ today
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        currentWeekIdx = 0;
        for (let i = 0; i < allWeeks.length; i++) {
          const d = parseLocalDate(allWeeks[i].date);
          if (d <= today) { currentWeekIdx = i; break; }
        }
        activeIdx = currentWeekIdx;

        render();
      } catch (e) {
        document.getElementById('status-msg').textContent = 'Gagal memuatkan data. Sila cuba semula.';
        document.getElementById('status-msg').classList.add('error');
        document.getElementById('week-tag').textContent  = '–';
        document.getElementById('week-dates').textContent = '';
        console.error('Fuel price fetch error:', e);
      }
    }

    // ── Navigation ───────────────────────────────────────────

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (activeIdx < allWeeks.length - 1) { activeIdx++; render(); }
    });
    document.getElementById('btn-next').addEventListener('click', () => {
      // Allow going one step into future (activeIdx -1) for empty next-week state
      if (activeIdx > currentWeekIdx - 1) { activeIdx--; render(); }
    });

    init();
  </script>
</body>
</html>
