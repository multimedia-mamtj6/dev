<!DOCTYPE html>
<html lang="ms">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kutipan Projek — Admin MAMTJ6</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body>

  <div class="sidebar-mobile-topbar">
    <button class="sidebar-toggle-btn" onclick="toggleNav()" aria-label="Menu">&#9776;</button>
    <span>Admin MAMTJ6</span>
  </div>
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeNav()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">Admin MAMTJ6</div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="sidebar-logout-btn" onclick="signOut()">Log Keluar</button>
    </div>
  </aside>

  <div class="admin-content">
  <div class="page">
    <div id="project-header">
      <p style="margin-top:-0.5rem"><a href="projek.html">&larr; Kembali ke Projek</a></p>
      <div class="section-header">
        <h1 class="section-title">Kutipan: <span id="project-name">—</span></h1>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
          <button class="btn btn-primary" id="add-donation-btn" onclick="openAddModal()">+ Catat Kutipan</button>
          <button class="btn btn-ghost" id="publish-daily-btn" onclick="publishInfaq('daily', 'publish-daily-btn')" style="display:none">Terbitkan</button>
        </div>
      </div>
      <p class="schedule-actions-note" id="last-published-daily" style="display:none;font-weight:600;font-size:0.8125rem"></p>
      <p style="color:var(--text-muted);margin-top:-0.75rem">Status: <strong id="project-status">—</strong></p>
      <p id="project-launch-info" style="color:var(--text-muted);font-size:0.875rem;display:none"></p>

      <div class="card" style="padding:1rem 1.25rem;margin-bottom:1.25rem">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <p id="progress-text" style="color:var(--text-muted);font-size:0.875rem;margin-top:0.5rem">RM 0.00 daripada RM 0.00 (0%)</p>
      </div>
    </div>

    <div class="card">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:50px">Bil.</th>
            <th style="width:110px">Tarikh</th>
            <th style="width:140px">Jumlah</th>
            <th>Keterangan</th>
            <th style="width:120px">Tindakan</th>
          </tr>
        </thead>
        <tbody id="donation-tbody">
          <tr>
            <td colspan="5" class="state-cell">Memuatkan...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div style="text-align:center;margin-top:1rem">
      <button class="btn btn-ghost" id="load-more-btn" onclick="loadMore()" style="display:none">Tunjuk 50 lagi</button>
    </div>
  </div>
  </div>

  <!-- ── Add / Edit modal ── -->
  <div class="modal-overlay" id="donation-modal" onclick="handleOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="donation-modal-title">Catat Kutipan</span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>

      <input type="hidden" id="edit-id">

      <div class="form-group">
        <label for="edit-date">Tarikh*</label>
        <input type="date" id="edit-date">
      </div>
      <div class="form-group">
        <label for="edit-amount">Jumlah (RM)*</label>
        <input type="number" id="edit-amount" min="0.01" step="0.01" placeholder="0.00">
      </div>
      <div class="form-group">
        <label for="edit-keterangan">Keterangan</label>
        <textarea id="edit-keterangan" rows="2" placeholder="Cth: Kutipan Tabung (Fizikal, 12/7/2026)"></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
        <button class="btn btn-primary" id="save-btn" onclick="saveDonation()">Simpan</button>
      </div>
    </div>
  </div>

  <!-- ── Delete confirm modal ── -->
  <div class="modal-overlay" id="delete-modal" onclick="handleDeleteOverlay(event)">
    <div class="modal" style="max-width:360px">
      <div class="modal-header">
        <span class="modal-title">Padam Rekod Kutipan</span>
        <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
      </div>
      <p style="color:var(--text-muted);margin-bottom:1.25rem">
        Adakah anda pasti mahu memadam rekod kutipan
        <strong id="delete-label" style="color:var(--text)"></strong>? Tindakan ini tidak boleh diundur.
      </p>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeDeleteModal()">Batal</button>
        <button class="btn btn-danger" id="confirm-delete-btn" onclick="confirmDelete()">Padam</button>
      </div>
    </div>
  </div>

  <script src="/admin/app.js"></script>
  <script src="/admin/infaq/infaq-common.js"></script>
  <script src="/admin/infaq/projek-kutipan.js"></script>
</body>

</html>
