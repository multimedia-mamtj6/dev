<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengguna — Admin MAMTJ6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<div id="sidebar-root"></div>

<div class="md:pl-64">
<div class="page">
  <div class="section-header">
    <h1 class="section-title">Urus Pengguna</h1>
    <button class="btn btn-primary" onclick="openAddModal()">+ Tambah Pengguna</button>
  </div>

  <div class="card">
    <table class="data-table">
      <thead>
        <tr>
          <th>E-mel</th>
          <th>Nama</th>
          <th>Peranan</th>
          <th>Kebenaran Modul</th>
          <th style="width:130px">Tindakan</th>
        </tr>
      </thead>
      <tbody id="users-tbody">
        <tr><td colspan="5" class="state-cell">Memuatkan...</td></tr>
      </tbody>
    </table>
  </div>
</div>
</div>

<!-- ── Add / Edit modal ── -->
<div class="modal-overlay" id="user-modal" onclick="handleUserOverlay(event)">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <span class="modal-title" id="user-modal-title">Tambah Pengguna</span>
      <button class="modal-close" onclick="closeUserModal()">&times;</button>
    </div>

    <input type="hidden" id="edit-original-email">

    <div class="form-group">
      <label for="edit-email">E-mel Google *</label>
      <input type="email" id="edit-email" placeholder="contoh@gmail.com">
    </div>
    <div class="form-group">
      <label for="edit-name">Nama</label>
      <input type="text" id="edit-name" placeholder="Nama pentadbir">
    </div>
    <div class="form-group">
      <label for="edit-role">Peranan *</label>
      <select id="edit-role" onchange="togglePermFields()">
        <option value="editor">Editor</option>
        <option value="super_admin">Super Admin</option>
      </select>
      <p style="font-size:0.75rem;color:var(--text-muted);margin-top:0.375rem" id="role-hint"></p>
    </div>
    <div class="form-group" id="perm-group">
      <label>Kebenaran Modul</label>
      <div style="display:flex;flex-direction:column;gap:0.5rem;margin-top:0.375rem">
        <label style="display:flex;align-items:center;gap:0.5rem;font-weight:400;color:var(--text)">
          <input type="checkbox" id="perm-kuliah">
          Jadual Kuliah
        </label>
        <label style="display:flex;align-items:center;gap:0.5rem;font-weight:400;color:var(--text)">
          <input type="checkbox" id="perm-infaq">
          Kutipan Infaq
        </label>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeUserModal()">Batal</button>
      <button class="btn btn-primary" id="user-save-btn" onclick="saveUser()">Simpan</button>
    </div>
  </div>
</div>

<!-- ── Remove confirm modal ── -->
<div class="modal-overlay" id="delete-user-modal" onclick="handleDeleteOverlay(event)">
  <div class="modal" style="max-width:360px">
    <div class="modal-header">
      <span class="modal-title">Buang Pengguna</span>
      <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
    </div>
    <p style="color:var(--text-muted);margin-bottom:1.25rem">
      Adakah anda pasti mahu membuang
      <strong id="delete-user-email" style="color:var(--text)"></strong>?
      Pengguna ini tidak lagi dapat log masuk.
    </p>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeDeleteModal()">Batal</button>
      <button class="btn btn-danger" id="confirm-delete-btn" onclick="confirmDeleteUser()">Buang</button>
    </div>
  </div>
</div>

<script src="/admin/app.js"></script>
<script src="/admin/users.js"></script>
</body>
</html>
